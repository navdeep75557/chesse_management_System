services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chess_app
      POSTGRES_PASSWORD: chess_app_password
      POSTGRES_DB: chess_tournaments
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chess_app -d chess_tournaments']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chess_app:chess_app_password@postgres:5432/chess_tournaments?schema=public
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && node build/index.js"

volumes:
  postgres_data:
